<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer thin white ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Main black circle -->
  <circle cx="200" cy="200" r="183" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner thin white ring -->
  <circle cx="200" cy="200" r="173" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- ANIDASO -->
  <text
    x="200"
    y="176"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-weight="900"
    font-size="52"
    letter-spacing="3"
    fill="#ffffff"
  >ANIDASO</text>

  <!-- EXPRESS -->
  <text
    x="200"
    y="218"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-weight="900"
    font-size="46"
    letter-spacing="3"
    fill="#ffffff"
  >EXPRESS</text>

  <!-- BOOKING -->
  <text
    x="200"
    y="256"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-weight="900"
    font-size="40"
    letter-spacing="2"
    fill="#ffffff"
  >BOOKING</text>

  <!-- ONLINE (quoted) -->
  <text
    x="200"
    y="291"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-weight="700"
    font-size="32"
    letter-spacing="1"
    fill="#ffffff"
  >"ONLINE</text>

  <!-- (ONLINE) subtext -->
  <text
    x="200"
    y="318"
    text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-weight="400"
    font-size="20"
    letter-spacing="1"
    fill="#ffffff"
  >(ONLINE)</text>

</svg>
